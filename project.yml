name: TokensWidget
options:
  minimumXcodeGenVersion: 2.42.0
packages:
  TokenUsageCore:
    path: .
targets:
  TokensWidgetApp:
    type: application
    platform: macOS
    deploymentTarget: "15.0"
    info:
      path: Config/App-Info.plist
    entitlements:
      path: Config/TokensWidgetApp.entitlements
      properties:
        com.apple.developer.team-identifier: $(DEVELOPMENT_TEAM)
        com.apple.security.app-sandbox: true
        com.apple.security.application-groups:
          - group.dev.vova.tokenswidget
        com.apple.security.files.bookmarks.app-scope: true
        com.apple.security.files.user-selected.read-only: true
    sources:
      - path: App/Sources
      - path: SharedUI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.vova.TokensWidget
        PRODUCT_NAME: TokensWidget
        SWIFT_VERSION: 6.0
        MARKETING_VERSION: 0.1.0
        CURRENT_PROJECT_VERSION: 1
        ENABLE_APP_SANDBOX: YES
        ENABLE_USER_SELECTED_FILES: readonly
        REGISTER_APP_GROUPS: YES
        CODE_SIGN_ENTITLEMENTS: Config/TokensWidgetApp.entitlements
    dependencies:
      - package: TokenUsageCore
        product: TokenUsageCore
      - target: TokensUsageWidgetExtension
        embed: true
        codeSign: true

  TokensUsageWidgetExtension:
    type: app-extension
    platform: macOS
    deploymentTarget: "15.0"
    info:
      path: Config/Widget-Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: Config/TokensUsageWidget.entitlements
      properties:
        com.apple.developer.team-identifier: $(DEVELOPMENT_TEAM)
        com.apple.security.app-sandbox: true
        com.apple.security.application-groups:
          - group.dev.vova.tokenswidget
    sources:
      - path: Widget/Sources
      - path: SharedUI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.vova.TokensWidget.WidgetExtension
        PRODUCT_NAME: TokensUsageWidgetExtension
        SWIFT_VERSION: 6.0
        MARKETING_VERSION: 0.1.0
        CURRENT_PROJECT_VERSION: 1
        ENABLE_APP_SANDBOX: YES
        REGISTER_APP_GROUPS: YES
        CODE_SIGN_ENTITLEMENTS: Config/TokensUsageWidget.entitlements
        APPLICATION_EXTENSION_API_ONLY: YES
    dependencies:
      - package: TokenUsageCore
        product: TokenUsageCore

schemes:
  TokensWidget:
    build:
      targets:
        TokensWidgetApp: all
        TokensUsageWidgetExtension: all
    run:
      config: Debug
      executable: TokensWidgetApp
